name: Release firmware

# Every push to main builds the firmware fresh and publishes a GitHub Release
# tagged with the contents of the VERSION file. If VERSION was not bumped
# (i.e. a tag with that exact version already exists), scripts/bump_version_if_needed.py
# increments the last component, the build bakes the new version in, and the
# bump is committed back to main with [skip ci] so it doesn't loop.
#
# It then ALSO mirrors the freshly built firmware.uf2 onto the latest release of
# Architeuthis-Flux/JumperlessV5 (the public repo the app pulls firmware from):
# the existing release's title/notes are left untouched, its tag is bumped to
# this version, and its firmware.uf2 asset is replaced. That step needs a PAT
# (secret JUMPERLESSV5_TOKEN) with write access to JumperlessV5, and is skipped
# if the secret is absent or if VERSION isn't strictly newer than JumperlessV5's
# current release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # Forks can't (and shouldn't) push tags / create releases on this repo.
    if: github.repository == 'Architeuthis-Flux/JumperlOS'
    runs-on: ubuntu-latest

    env:
      # PAT with write access to Architeuthis-Flux/JumperlessV5 (classic token with
      # `repo` scope, or a fine-grained token with Contents: read/write on that
      # repo). Required because the default GITHUB_TOKEN is scoped to THIS repo
      # only. When unset (e.g. on a fork or before the secret is added), the
      # JumperlessV5 mirror step below is skipped instead of failing the build.
      JUMPERLESSV5_TOKEN: ${{ secrets.JUMPERLESSV5_TOKEN }}
      # PAT with write access to Architeuthis-Flux/Jumperless (the public OG repo).
      # When set, the OG firmware is mirrored onto that repo's latest release as a
      # separate asset; when unset the OG mirror step is skipped (not failed).
      JUMPERLESS_OG_TOKEN: ${{ secrets.JUMPERLESS_OG_TOKEN }}

    steps:
      - name: Checkout (full history, tags and submodules)
        uses: actions/checkout@v4
        with:
          # Full history + tags so the bump script can see existing releases.
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Resolve release version (auto-bump if VERSION was not bumped)
        id: version
        run: python scripts/bump_version_if_needed.py

      - name: Build V5 firmware
        # version_from_file.py (pre-build) bakes steps.version.outputs.version
        # into FirmwareVersion.generated.h, so the binary matches the tag.
        run: pio run -e jumperless_v5

      - name: Stage V5 firmware asset
        # Capture the V5 uf2 into dist/ RIGHT AFTER its build (before the OG build
        # and the version-bump commit) so the release/mirror reference a stable
        # path that nothing downstream can clear. firmware.uf2 is no longer a
        # tracked file, so it only exists if this build produced it -- fail loudly
        # here (early + clear) rather than at release time if it's missing. Keep
        # the exact name firmware.uf2 (the app + JumperlessV5 mirror fetch it by
        # that name).
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ ! -f .pio/build/jumperless_v5/firmware.uf2 ]; then
            echo "::error::V5 build did not produce firmware.uf2"
            ls -la .pio/build/jumperless_v5 || true
            exit 1
          fi
          cp .pio/build/jumperless_v5/firmware.uf2 dist/firmware.uf2
          echo "Staged V5 firmware dist/firmware.uf2"

      - name: Build OG firmware
        # Same source/version cadence; version_from_file.py remaps the major to
        # 1 for the OG env, so this binary reports 1.x.x.x (e.g. 1.7.0.12).
        run: pio run -e jumperless_og

      - name: Stage OG firmware asset (versioned 1.x.x.x)
        id: og
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # 5.7.0.12 -> 1.7.0.12 (swap the leading major component for 1).
          OG_VERSION="1.${VERSION#*.}"
          mkdir -p dist
          if [ ! -f .pio/build/jumperless_og/firmware.uf2 ]; then
            echo "::error::OG build did not produce firmware.uf2"
            ls -la .pio/build/jumperless_og || true
            exit 1
          fi
          # Asset name shared by the JumperlOS release and the public-repo mirror.
          cp .pio/build/jumperless_og/firmware.uf2 "dist/firmware_og_backport.${OG_VERSION}.uf2"
          echo "og_version=$OG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Staged OG firmware dist/firmware_og_backport.${OG_VERSION}.uf2"

      - name: Commit version bump back to main
        if: steps.version.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Auto-bump firmware version to ${VERSION} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create GitHub release
        # Publishes BOTH firmwares in one release: the V5 firmware.uf2 (asset name
        # kept as firmware.uf2 -- the app/mirror download it by that name) and the
        # OG firmware as firmware_og_backport.<1.x.x.x>.uf2.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          OG_VERSION: ${{ steps.og.outputs.og_version }}
        run: |
          SHA="$(git rev-parse HEAD)"
          gh release create "$VERSION" \
            "dist/firmware.uf2#Jumperless V5 firmware (${VERSION})" \
            "dist/firmware_og_backport.${OG_VERSION}.uf2#Jumperless OG firmware backport (${OG_VERSION})" \
            --target "$SHA" \
            --title "$VERSION" \
            --generate-notes

      - name: Mirror firmware onto the JumperlessV5 latest release
        # Skip gracefully when the cross-repo PAT secret isn't configured.
        if: ${{ env.JUMPERLESSV5_TOKEN != '' }}
        env:
          # gh authenticates against JumperlessV5 with the cross-repo PAT here.
          GH_TOKEN: ${{ env.JUMPERLESSV5_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          REPO="Architeuthis-Flux/JumperlessV5"

          CUR_TAG="$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || true)"
          echo "JumperlessV5 latest tag: '${CUR_TAG:-<none>}'  |  JumperlOS version: '$VERSION'"

          if [ -z "$CUR_TAG" ]; then
            echo "::warning::No existing JumperlessV5 release found; nothing to update. Create one there first."
            exit 0
          fi

          # Only proceed if our version is STRICTLY newer than JumperlessV5's current
          # release, so a stale VERSION can never downgrade the public release tag.
          HIGHEST="$(printf '%s\n%s\n' "$CUR_TAG" "$VERSION" | sort -V | tail -n1)"
          if [ "$VERSION" = "$CUR_TAG" ] || [ "$HIGHEST" != "$VERSION" ]; then
            echo "::warning::JumperlOS version ($VERSION) is not newer than JumperlessV5 ($CUR_TAG); skipping mirror."
            exit 0
          fi

          # Bump the tag in place (keeps the existing title + release notes) and keep
          # it marked latest, then replace just the firmware.uf2 asset.
          gh release edit "$CUR_TAG" --repo "$REPO" --tag "$VERSION" --latest
          gh release upload "$VERSION" "dist/firmware.uf2" --repo "$REPO" --clobber
          echo "Updated $REPO: tag $CUR_TAG -> $VERSION, firmware.uf2 replaced (notes left untouched)."

      - name: Mirror OG firmware onto the public Jumperless latest release
        # Attaches the OG backport firmware to the CURRENT latest release on
        # Architeuthis-Flux/Jumperless as a SEPARATE asset
        # (firmware_og_backport.<1.x.x.x>.uf2). It deliberately does NOT touch the
        # existing firmware.uf2 on that release, so the current auto-updater keeps
        # grabbing the old firmware -- the OG build is just an extra download
        # option on the latest release. Skipped (not failed) when the PAT is
        # absent. Unlike the JumperlessV5 mirror, the tag is NOT bumped and the
        # release notes are left untouched.
        if: ${{ env.JUMPERLESS_OG_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.JUMPERLESS_OG_TOKEN }}
          OG_VERSION: ${{ steps.og.outputs.og_version }}
        run: |
          set -euo pipefail
          REPO="Architeuthis-Flux/Jumperless"
          ASSET="firmware_og_backport.${OG_VERSION}.uf2"

          CUR_TAG="$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || true)"
          echo "Jumperless latest tag: '${CUR_TAG:-<none>}'  |  OG firmware: '$ASSET'"
          if [ -z "$CUR_TAG" ]; then
            echo "::warning::No existing release on $REPO; nothing to attach the OG firmware to."
            exit 0
          fi

          # Add/replace ONLY our OG asset (same name -> --clobber updates it on a
          # re-run); firmware.uf2 and all other assets on the release are untouched.
          gh release upload "$CUR_TAG" "dist/${ASSET}" --repo "$REPO" --clobber
          # Make sure that release stays the published "latest".
          gh release edit "$CUR_TAG" --repo "$REPO" --latest
          echo "Attached $ASSET to $REPO release $CUR_TAG (existing firmware.uf2 left intact)."
